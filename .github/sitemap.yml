name: Generate Sitemap

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          BASE_URL="https://joharjobalert.in"

          echo "<url><loc>$BASE_URL/</loc></url>" >> sitemap.xml
          echo "<url><loc>$BASE_URL/admit-card.html</loc></url>" >> sitemap.xml
          echo "<url><loc>$BASE_URL/result.html</loc></url>" >> sitemap.xml
          echo "<url><loc>$BASE_URL/contact.html</loc></url>" >> sitemap.xml

          find . -name "*.html" | while read file; do
            url=$(echo $file | sed 's|^\./||')
            if [[ "$url" != "index.html" && "$url" != "admit-card.html" && "$url" != "result.html" && "$url" != "contact.html" ]]; then
              echo "<url><loc>$BASE_URL/$url</loc></url>" >> sitemap.xml
            fi
          done

          echo "</urlset>" >> sitemap.xml

      - name: Commit sitemap
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add sitemap.xml
          git commit -m "Auto update sitemap"
          git push
